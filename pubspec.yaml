name: aura_study
description: "Aura Study - Plataforma educativa social com IA."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.2

  # Firebase
  firebase_core: ^2.30.0
  firebase_auth: ^4.19.4
  cloud_firestore: ^4.17.2
  firebase_storage: ^11.7.5
  firebase_messaging: ^14.9.2
  google_sign_in: ^6.2.1

  # AI / HTTP
  http: ^1.2.1

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_markdown: ^0.7.1
  table_calendar: ^3.1.1
  fl_chart: ^0.67.0

  # Utils
  intl: ^0.19.0
  image_picker: ^1.1.1
  file_picker: ^8.0.3
  shared_preferences: ^2.2.3
  uuid: ^4.4.0
  crypto: ^3.0.3
  flutter_local_notifications: ^17.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
